name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          command_timeout: 10m
          script: |
            set -e

            echo "=== Deploying portal-frontend ==="
            cd /root/portal-frontend
            git fetch --all --prune
            git reset --hard origin/main

            echo "=== Installing dependencies ==="
            npm ci --production

            echo "=== Generating Prisma client ==="
            npx prisma generate --schema=prisma/schema.prisma || true

            echo "=== Running migrations ==="
            npx prisma migrate deploy --schema=prisma/schema.prisma || true

            echo "=== Building ==="
            npm run build

            echo "=== Restarting PM2 ==="
            pm2 restart ecosystem.config.js --env production 2>/dev/null || pm2 start ecosystem.config.js --env production
            pm2 save

            echo "=== Ensuring Nginx is running ==="
            systemctl is-active --quiet nginx || systemctl start nginx

            echo "=== Verifying ==="
            sleep 3
            curl -sf --max-time 10 http://localhost:3001 > /dev/null && echo "Frontend: OK" || echo "Frontend: FAILED"
            echo "=== Deploy complete ==="
